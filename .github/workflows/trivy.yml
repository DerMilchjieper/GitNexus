name: Trivy Image Scan

# Builds Dockerfile.cli and Dockerfile.web, then scans the resulting images
# for OS-package and language-package CVEs at HIGH/CRITICAL severity.
# Findings upload to the Security tab; record-only (does not block merges).
#
# NOT triggered on PRs — image builds are slow and base-image CVE churn
# shouldn't gate feature delivery.

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan:
    name: Trivy (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        image:
          - { dockerfile: Dockerfile.cli, name: gitnexus-cli }
          - { dockerfile: Dockerfile.web, name: gitnexus-web }

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # NOTE: docker/build-push-action and aquasecurity/trivy-action pins
      # use major-version tags on initial introduction; convert to commit
      # SHAs in a follow-up PR.
      - name: Build image (load locally for scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          load: true
          push: false
          tags: scan-target:${{ matrix.image.name }}

      - name: Run Trivy
        # Pinned to a released tag rather than @master — moving refs are a
        # supply-chain risk and zizmor (added in this same plan) flags them.
        # Convert to commit SHA in the same follow-up that pins the other
        # net-new actions.
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: scan-target:${{ matrix.image.name }}
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif
          severity: HIGH,CRITICAL
          # Hides CVEs with no available fix in the base image.
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: trivy-${{ matrix.image.name }}
